<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon Profil - EuroFêtes Historiques</title>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/custom.css" />
  </head>

  <body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Main Content -->
    <main class="container py-5" style="max-width: 800px">
      <div class="profile-card text-center">
        <h2 class="page-title mb-4">Mon Profil</h2>

        <div class="mb-4">
          <div
            class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
            style="width: 80px; height: 80px"
          >
            <i class="bi bi-person fs-1"></i>
          </div>
          <h3 class="h5 mb-1" id="userName">Nom d'utilisateur</h3>
          <p class="text-muted" id="userEmail">email@exemple.com</p>
        </div>

        <p class="text-muted mb-4">
          Gérez vos réservations et vos événements créés
        </p>

        <div class="row g-4 text-start">
          <div class="col-md-6">
            <div class="profile-section">
              <h4
                class="h6 fw-semibold text-primary mb-2 d-flex align-items-center gap-2"
              >
                <i class="bi bi-ticket-perforated"></i>
                Mes Réservations
              </h4>
              <p class="text-muted small mb-0">
                Vous n'avez pas encore de réservations
              </p>
            </div>
          </div>

          <div class="col-md-6">
            <div class="profile-section">
              <h4
                class="h6 fw-semibold text-primary mb-2 d-flex align-items-center gap-2"
              >
                <i class="bi bi-calendar-event"></i>
                Mes Événements
              </h4>
              <p class="text-muted small mb-0">
                Vous n'avez pas encore créé d'événements
              </p>
            </div>
          </div>
        </div>

        <button
          class="btn btn-outline-secondary mt-4"
          onclick="window.location.href = '../pages/index.html'"
        >
          <i class="bi bi-arrow-left me-2"></i>Retour à l'accueil
        </button>
      </div>
    </main>

    <!-- Toast Container -->
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <!-- Bootstrap Bundle JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <!-- Page Script -->
    <script type="module" src="../assets/js/pages/profile.js"></script>
  </body>
</html>

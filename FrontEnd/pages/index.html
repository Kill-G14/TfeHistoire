<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EuroFêtes Historiques - Événements historiques d'Europe</title>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/custom.css" />
  </head>

  <body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Main Content -->
    <main class="container py-5">
      <!-- Hero Section -->
      <div class="text-center mb-5">
        <h1 class="page-title">Festivités Historiques d'Europe</h1>
        <p class="page-subtitle">
          Découvrez et participez aux plus grandes célébrations historiques à
          travers l'Europe
        </p>
      </div>

      <!-- Filters -->
      <div class="filterContainer mb-4">
        <div class="mb-3">
          <div class="position-relative">
            <i
              class="bi bi-search position-absolute top-50 translate-middle-y ms-3 text-muted"
            ></i>
            <input
              type="text"
              class="form-control ps-5"
              id="searchInput"
              placeholder="Rechercher un événement, une ville..."
            />
          </div>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <div class="d-flex align-items-center gap-2">
              <i class="bi bi-funnel text-muted"></i>
              <select class="form-select" id="countrySelect">
                <option value="all">Tous les pays</option>
              </select>
            </div>
          </div>

          <div class="col-md-6">
            <select class="form-select" id="categorySelect">
              <option value="all">Toutes les catégories</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Events List -->
      <div
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
        id="eventsList"
      >
        <!-- Les cartes d'événements seront injectées ici -->
      </div>
    </main>

    <!-- Toast Container -->
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <!-- Bootstrap Bundle JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <!-- Page Script -->
    <script type="module" src="../assets/js/pages/home.js"></script>
  </body>
</html>

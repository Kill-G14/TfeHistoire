<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte des événements - EuroFêtes Historiques</title>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/custom.css" />
  </head>

  <body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Main Content -->
    <main class="container py-5">
      <div class="text-center" style="max-width: 700px; margin: 0 auto">
        <div class="bg-white border rounded-3 p-5">
          <i class="bi bi-map fs-1 text-primary mb-3 d-block"></i>
          <h2 class="page-title mb-3">Carte interactive</h2>
          <p class="text-muted">
            La carte interactive des événements sera disponible prochainement
            avec une visualisation géographique de tous les événements en
            Europe.
          </p>
          <button
            class="btn btn-primary mt-3"
            onclick="window.location.href = '../pages/index.html'"
          >
            <i class="bi bi-arrow-left me-2"></i>Retour aux événements
          </button>
        </div>
      </div>
    </main>

    <!-- Toast Container -->
    <div
      class="toast-container position-fixed top-0 end-0 p-3"
      id="toastContainer"
    ></div>

    <!-- Bootstrap Bundle JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <!-- Page Script -->
    <script type="module" src="../assets/js/pages/map.js"></script>
  </body>
</html>

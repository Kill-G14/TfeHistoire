<template id="loginModalTemplate">
  <div
    class="modal fade"
    id="loginModal"
    tabindex="-1"
    aria-labelledby="loginModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="loginModalLabel">Bienvenue</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <ul class="nav nav-tabs mb-4" id="authTabs" role="tablist">
            <li class="nav-item flex-fill" role="presentation">
              <button
                class="nav-link active w-100"
                id="login-tab"
                data-bs-toggle="tab"
                data-bs-target="#login-content"
                type="button"
                role="tab"
              >
                Connexion
              </button>
            </li>
            <li class="nav-item flex-fill" role="presentation">
              <button
                class="nav-link w-100"
                id="register-tab"
                data-bs-toggle="tab"
                data-bs-target="#register-content"
                type="button"
                role="tab"
              >
                Inscription
              </button>
            </li>
          </ul>

          <div class="tab-content" id="authTabsContent">
            <!-- Onglet Connexion -->
            <div
              class="tab-pane fade show active"
              id="login-content"
              role="tabpanel"
            >
              <form id="loginForm">
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="loginEmail"
                    placeholder="votre@email.com"
                    required
                  />
                  <div class="invalid-feedback" id="loginEmailError"></div>
                </div>
                <div class="mb-3">
                  <label for="loginPassword" class="form-label"
                    >Mot de passe</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="loginPassword"
                    placeholder="••••••••"
                    required
                  />
                  <div class="invalid-feedback" id="loginPasswordError"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Se connecter
                </button>
              </form>
            </div>

            <!-- Onglet Inscription -->
            <div class="tab-pane fade" id="register-content" role="tabpanel">
              <form id="registerForm">
                <div class="mb-3">
                  <label for="registerName" class="form-label"
                    >Nom complet</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="registerName"
                    placeholder="Jean Dupont"
                    required
                  />
                  <div class="invalid-feedback" id="registerNameError"></div>
                </div>
                <div class="mb-3">
                  <label for="registerEmail" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="registerEmail"
                    placeholder="votre@email.com"
                    required
                  />
                  <div class="invalid-feedback" id="registerEmailError"></div>
                </div>
                <div class="mb-3">
                  <label for="registerPassword" class="form-label"
                    >Mot de passe</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="registerPassword"
                    placeholder="••••••••"
                    required
                  />
                  <div
                    class="invalid-feedback"
                    id="registerPasswordError"
                  ></div>
                </div>
                <button
                  type="submit"
                  class="btn btn-primary w-100"
                  id="registerSubmitBtn"
                  disabled
                >
                  S'inscrire
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

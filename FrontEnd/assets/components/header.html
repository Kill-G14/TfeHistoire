<template id="headerTemplate">
  <header class="header">
    <div class="container py-3">
      <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-4">
          <a
            href="/"
            data-link
            class="header-logo d-flex align-items-center gap-2"
          >
            <i class="bi bi-calendar-event fs-4"></i>
            <span>MemoriaEventia</span>
          </a>

          <nav class="d-none d-md-flex align-items-center gap-3">
            <a href="/" data-link class="nav-link" id="navHome">Événements</a>
            <a href="/map" data-link class="nav-link" id="navMap">Carte</a>
          </nav>
        </div>

        <div class="d-flex align-items-center gap-2" id="headerActions">
          <!-- Actions injectées dynamiquement -->
        </div>
      </div>
    </div>
  </header>
</template>

<template id="headerActionsLoggedIn">
  <button
    class="btn btn-outline-primary btn-sm d-none d-sm-inline-flex align-items-center gap-2"
    id="btnCreateEvent"
  >
    <i class="bi bi-plus-lg"></i>
    Créer un événement
  </button>
  <button class="btn btn-outline-secondary btn-sm" id="btnProfile">
    <i class="bi bi-person fs-5"></i>
  </button>
  <button class="btn btn-outline-danger btn-sm" id="btnLogout">
    <i class="bi bi-box-arrow-right"></i>
  </button>
</template>

<template id="headerActionsLoggedOut">
  <button
    class="btn btn-primary btn-sm d-flex align-items-center gap-2"
    id="btnLogin"
  >
    <i class="bi bi-box-arrow-in-right"></i>
    Connexion
  </button>
</template>

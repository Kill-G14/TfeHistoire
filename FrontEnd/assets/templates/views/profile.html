<template id="profileView">
  <div class="container py-5" style="max-width: 1000px">
    <!-- En-tête du profil -->
    <div class="profile-header mb-4">
      <div class="row align-items-center">
        <div class="col-md-8">
          <div class="d-flex align-items-center gap-4">
            <div
              class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
              style="width: 100px; height: 100px; flex-shrink: 0"
            >
              <i class="bi bi-person fs-1"></i>
            </div>
            <div>
              <h1 class="page-title mb-2" id="userName">Nom d'utilisateur</h1>
              <p class="text-muted mb-2" id="userEmail">email@exemple.com</p>
              <a
                href="#"
                class="text-decoration-none"
                data-bs-toggle="modal"
                data-bs-target="#changePasswordModal"
                style="font-size: 0.95rem; color: #dc3545; border: 1px solid #dc3545; padding: 0.25rem 0.75rem; border-radius: 0.25rem; transition: all 0.2s; display: inline-block"
              >
                <span>Modifier le mot de passe</span>
              </a>
            </div>
          </div>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
          <div class="d-flex flex-column align-items-md-end align-items-center gap-3">
            <span class="badge bg-primary" id="memberSince">Membre depuis...</span>
            <a
              href="/create-event"
              data-link
              class="btn btn-primary btn-lg d-flex align-items-center justify-content-center gap-2"
              style="font-size: 1.1rem"
            >
              <i class="bi bi-plus-circle-fill"></i>
              Créer un événement
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Statistiques rapides -->
    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="profile-stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon bg-primary">
              <i class="bi bi-calendar-event"></i>
            </div>
            <div>
              <h3 class="stat-number mb-0" id="statEvents">0</h3>
              <p class="stat-label mb-0">Événements créés</p>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="profile-stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon bg-success">
              <i class="bi bi-ticket-perforated"></i>
            </div>
            <div>
              <h3 class="stat-number mb-0" id="statReservations">0</h3>
              <p class="stat-label mb-0">Réservations</p>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="profile-stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon bg-warning">
              <i class="bi bi-heart-fill"></i>
            </div>
            <div>
              <h3 class="stat-number mb-0" id="statFavorites">0</h3>
              <p class="stat-label mb-0">Favoris</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sections principales -->
    <div class="row g-4">
      <!-- Mes Événements -->
      <div class="col-md-6">
        <div class="profile-section-card">
          <div class="section-header">
            <div class="d-flex align-items-center gap-3 mb-3">
              <div class="section-icon bg-primary">
                <i class="bi bi-calendar-event"></i>
              </div>
              <h2 class="section-title mb-0">Mes Événements</h2>
            </div>
          </div>
          <div class="section-content" id="userEvents">
            <div class="empty-state-small">
              <i class="bi bi-calendar-x text-muted fs-1 mb-2"></i>
              <p class="text-muted mb-3">
                Vous n'avez pas encore créé d'événements
              </p>
              <a
                href="/create-event"
                data-link
                class="btn btn-outline-primary btn-sm"
              >
                <i class="bi bi-plus-lg me-2"></i>Créer mon premier événement
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Mes Réservations -->
      <div class="col-md-6">
        <div class="profile-section-card">
          <div class="section-header">
            <div class="d-flex align-items-center gap-3 mb-3">
              <div class="section-icon bg-success">
                <i class="bi bi-ticket-perforated"></i>
              </div>
              <h2 class="section-title mb-0">Mes Réservations</h2>
            </div>
          </div>
          <div class="section-content" id="userReservations">
            <div class="empty-state-small">
              <i class="bi bi-ticket text-muted fs-1 mb-2"></i>
              <p class="text-muted mb-3">
                Vous n'avez pas encore de réservations
              </p>
              <a href="/" data-link class="btn btn-outline-primary btn-sm">
                <i class="bi bi-search me-2"></i>Découvrir les événements
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mes Favoris -->
    <div class="mt-4">
      <div class="profile-section-card">
        <div class="section-header">
          <div class="d-flex align-items-center gap-3 mb-3">
            <div class="section-icon bg-warning">
              <i class="bi bi-heart-fill"></i>
            </div>
            <h2 class="section-title mb-0">Mes Favoris</h2>
          </div>
        </div>
        <div class="section-content" id="userFavorites">
          <div class="empty-state-small">
            <i class="bi bi-heart text-muted fs-1 mb-2"></i>
            <p class="text-muted mb-0">Aucun événement en favoris</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Bouton retour -->
    <div class="text-center mt-5">
      <a href="/" data-link class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Retour à l'accueil
      </a>
    </div>
  </div>

  <!-- Modal Changement de mot de passe -->
  <div
    class="modal fade"
    id="changePasswordModal"
    tabindex="-1"
    aria-labelledby="changePasswordModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="changePasswordModalLabel">
            <i class="bi bi-key me-2"></i>Changer de mot de passe
          </h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <form id="changePasswordForm">
            <div class="mb-3">
              <label for="currentPassword" class="form-label"
                >Mot de passe actuel</label
              >
              <input
                type="password"
                class="form-control"
                id="currentPassword"
                required
              />
              <div class="invalid-feedback" id="currentPasswordError"></div>
            </div>
            <div class="mb-3">
              <label for="newPassword" class="form-label"
                >Nouveau mot de passe</label
              >
              <input
                type="password"
                class="form-control"
                id="newPassword"
                required
              />
              <div class="form-text">Minimum 6 caractères</div>
              <div class="invalid-feedback" id="newPasswordError"></div>
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label"
                >Confirmer le nouveau mot de passe</label
              >
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                required
              />
              <div class="invalid-feedback" id="confirmPasswordError"></div>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle me-2"></i>Changer le mot de passe
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="resetPasswordModalTemplate">
  <div
    class="modal fade"
    id="resetPasswordModal"
    tabindex="-1"
    aria-labelledby="resetPasswordModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title" id="resetPasswordModalLabel">
            <i class="bi bi-shield-lock-fill me-2"></i>Réinitialiser le mot de
            passe
          </h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <p class="text-muted">
            Un code à 6 chiffres a été envoyé à votre adresse email.
          </p>
          <p class="text-warning mb-3">
            <i class="bi bi-clock-fill me-1"></i>
            <small>Le code expire dans 10 minutes</small>
          </p>

          <form id="resetPasswordForm">
            <div class="mb-3">
              <label for="resetPasswordCode" class="form-label"
                >Code de réinitialisation</label
              >
              <input
                type="text"
                class="form-control text-center fw-bold"
                id="resetPasswordCode"
                name="code"
                placeholder="000000"
                maxlength="6"
                pattern="[0-9]{6}"
                style="font-size: 1.5rem; letter-spacing: 0.5rem"
                required
              />
              <div class="invalid-feedback">
                Le code doit contenir 6 chiffres
              </div>
            </div>

            <div class="mb-3">
              <label for="resetPasswordNew" class="form-label"
                >Nouveau mot de passe</label
              >
              <input
                type="password"
                class="form-control"
                id="resetPasswordNew"
                name="newPassword"
                placeholder="Au moins 8 caractères"
                minlength="8"
                required
              />
              <div class="invalid-feedback">
                Le mot de passe doit contenir au moins 8 caractères
              </div>
            </div>

            <div class="mb-3">
              <label for="resetPasswordConfirm" class="form-label"
                >Confirmer le mot de passe</label
              >
              <input
                type="password"
                class="form-control"
                id="resetPasswordConfirm"
                name="confirmPassword"
                placeholder="Retapez votre mot de passe"
                minlength="8"
                required
              />
              <div class="invalid-feedback">
                Les mots de passe ne correspondent pas
              </div>
            </div>
          </form>

          <div id="resetPasswordAlert" class="alert d-none" role="alert"></div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Annuler
          </button>
          <button type="button" class="btn btn-success" id="btnResetPassword">
            <i class="bi bi-check-circle-fill me-2"></i>Réinitialiser
          </button>
        </div>
      </div>
    </div>
  </div>
</template>

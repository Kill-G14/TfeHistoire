<template id="forgotPasswordModalTemplate">
  <div
    class="modal fade"
    id="forgotPasswordModal"
    tabindex="-1"
    aria-labelledby="forgotPasswordModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="forgotPasswordModalLabel">
            <i class="bi bi-key-fill me-2"></i>Mot de passe oublié
          </h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <p class="text-muted">
            Entrez votre adresse email. Vous recevrez un code à 6 chiffres pour
            réinitialiser votre mot de passe.
          </p>

          <form id="forgotPasswordForm">
            <div class="mb-3">
              <label for="forgotPasswordEmail" class="form-label"
                >Adresse email</label
              >
              <input
                type="email"
                class="form-control"
                id="forgotPasswordEmail"
                name="email"
                placeholder="votre@email.com"
                required
              />
              <div class="invalid-feedback">
                Veuillez entrer une adresse email valide
              </div>
            </div>
          </form>

          <div id="forgotPasswordAlert" class="alert d-none" role="alert"></div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Annuler
          </button>
          <button type="button" class="btn btn-primary" id="btnSendResetCode">
            <i class="bi bi-send-fill me-2"></i>Envoyer le code
          </button>
        </div>
      </div>
    </div>
  </div>
</template>

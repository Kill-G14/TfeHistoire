<template id="eventCardTemplate">
  <div class="col">
    <div class="card eventCard h-100">
      <div class="position-relative overflow-hidden">
        <img
          src=""
          alt=""
          class="card-img-top eventCard-image"
          loading="lazy"
        />
        <button
          class="btn-favorite"
          data-event-id=""
          aria-label="Ajouter aux favoris"
        >
          <i class="bi bi-heart"></i>
        </button>
        <span class="badge position-absolute eventCard-category"></span>
      </div>
      <div class="card-body d-flex flex-column">
        <h5 class="card-title eventCard-title mb-2"></h5>
        <p
          class="card-text text-muted small line-clamp-2 mb-3 eventCard-description"
        ></p>

        <div class="mb-3">
          <div class="d-flex align-items-center gap-2 mb-2 small text-muted">
            <i class="bi bi-geo-alt icon-accent"></i>
            <span class="eventCard-location"></span>
          </div>
          <div class="d-flex align-items-center gap-2 mb-2 small text-muted">
            <i class="bi bi-calendar3 icon-accent"></i>
            <span class="eventCard-date"></span>
          </div>
          <div class="d-flex align-items-center gap-2 small text-muted">
            <i class="bi bi-clock icon-accent"></i>
            <span class="eventCard-time"></span>
          </div>
        </div>

        <div
          class="mt-auto pt-3 border-top d-flex align-items-center justify-content-between"
        >
          <div class="d-flex align-items-center">
            <i class="bi bi-currency-euro text-primary"></i>
            <span class="fw-bold text-primary eventCard-price"></span>
          </div>
          <button class="btn btn-outline-primary btn-sm eventCard-btn-details">
            Voir détails
          </button>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="reservationModalTemplate">
  <div
    class="modal fade"
    id="reservationModal"
    tabindex="-1"
    aria-labelledby="reservationModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-primary text-white border-0">
          <h5
            class="modal-title d-flex align-items-center gap-2"
            id="reservationModalLabel"
          >
            <i class="bi bi-calendar-check-fill"></i>
            Confirmation de réservation
          </h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body p-4">
          <div class="text-center mb-4">
            <div class="mb-3">
              <i
                class="bi bi-calendar-event text-primary"
                style="font-size: 4rem; opacity: 0.8"
              ></i>
            </div>
            <h6 class="text-muted mb-0">
              Confirmez-vous votre réservation pour cet événement ?
            </h6>
          </div>

          <div
            id="eventInfoReservation"
            class="card border-0 bg-light shadow-sm"
          >
            <!-- Les informations de l'événement seront affichées ici -->
          </div>

          <div
            class="alert alert-info d-flex align-items-center mt-3 mb-0"
            role="alert"
          >
            <i class="bi bi-info-circle-fill me-2"></i>
            <small>Cette réservation sera ajoutée à votre profil.</small>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0 pb-4 px-4 gap-2">
          <button
            type="button"
            class="btn btn-outline-secondary px-4"
            data-bs-dismiss="modal"
          >
            <i class="bi bi-x-lg me-1"></i> Annuler
          </button>
          <button
            type="button"
            class="btn btn-primary px-4"
            id="confirmReservationBtn"
          >
            <i class="bi bi-check-lg me-1"></i> Réserver
          </button>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="profileView">
  <div class="container py-5" style="max-width: 1000px">
    <!-- En-tête du profil -->
    <div class="profile-header mb-5">
      <div class="d-flex align-items-center gap-4">
        <div
          class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
          style="width: 100px; height: 100px; flex-shrink: 0"
        >
          <i class="bi bi-person fs-1"></i>
        </div>
        <div class="flex-grow-1">
          <h1 class="page-title mb-2" id="userName">Nom d'utilisateur</h1>
          <p class="text-muted mb-3" id="userEmail">email@exemple.com</p>
          <button
            type="button"
            class="btn btn-outline-primary btn-sm"
            data-bs-toggle="modal"
            data-bs-target="#changePasswordModal"
          >
            Modifier le mot de passe
          </button>
        </div>
      </div>
    </div>

    <!-- Statistiques cliquables -->
    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <button
          class="profile-stat-card stat-card-btn w-100"
          data-section="events"
          type="button"
        >
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon">
              <i class="bi bi-calendar-event text-primary"></i>
            </div>
            <div>
              <h3 class="stat-number mb-0" id="statEvents">0</h3>
              <p class="stat-label mb-0">Événements créés</p>
            </div>
          </div>
        </button>
      </div>
      <div class="col-md-4">
        <button
          class="profile-stat-card stat-card-btn w-100"
          data-section="reservations"
          type="button"
        >
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon">
              <i class="bi bi-ticket-perforated text-success"></i>
            </div>
            <div>
              <h3 class="stat-number mb-0" id="statReservations">0</h3>
              <p class="stat-label mb-0">Réservations</p>
            </div>
          </div>
        </button>
      </div>
      <div class="col-md-4">
        <button
          class="profile-stat-card stat-card-btn w-100 active"
          data-section="favorites"
          type="button"
        >
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon">
              <i class="bi bi-heart-fill text-warning"></i>
            </div>
            <div>
              <h3 class="stat-number mb-0" id="statFavorites">0</h3>
              <p class="stat-label mb-0">Favoris</p>
            </div>
          </div>
        </button>
      </div>
    </div>

    <!-- Section Mes Événements (cachée par défaut) -->
    <div class="profile-section" id="section-events" style="display: none">
      <div class="profile-section-card">
        <div class="section-header">
          <div
            class="d-flex align-items-center justify-content-between gap-3 mb-3"
          >
            <div class="d-flex align-items-center gap-3">
              <div class="section-icon">
                <i class="bi bi-calendar-event text-primary"></i>
              </div>
              <h2 class="section-title mb-0">Mes Événements</h2>
            </div>
            <a href="/create-event" data-link class="btn btn-primary">
              <i class="bi bi-plus-lg me-2"></i>Créer un événement
            </a>
          </div>
        </div>
        <div class="section-content" id="userEvents">
          <div class="empty-state-small">
            <i class="bi bi-calendar-x text-muted fs-1 mb-2"></i>
            <p class="text-muted mb-3">
              Vous n'avez pas encore créé d'événements
            </p>
            <a
              href="/create-event"
              data-link
              class="btn btn-outline-primary btn-sm"
            >
              <i class="bi bi-plus-lg me-2"></i>Créer mon événement
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Section Mes Réservations (cachée par défaut) -->
    <div
      class="profile-section"
      id="section-reservations"
      style="display: none"
    >
      <div class="profile-section-card">
        <div class="section-header">
          <div class="d-flex align-items-center gap-3 mb-3">
            <div class="section-icon">
              <i class="bi bi-ticket-perforated text-success"></i>
            </div>
            <h2 class="section-title mb-0">Mes Réservations</h2>
          </div>
        </div>
        <div class="section-content" id="userReservations">
          <div class="empty-state-small">
            <i class="bi bi-ticket text-muted fs-1 mb-2"></i>
            <p class="text-muted mb-3">
              Vous n'avez pas encore de réservations
            </p>
            <a href="./" data-link class="btn btn-outline-primary btn-sm">
              <i class="bi bi-search me-2"></i>Découvrir les événements
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Section Mes Favoris (affichée par défaut) -->
    <div class="profile-section" id="section-favorites">
      <div class="profile-section-card">
        <div class="section-header">
          <div class="d-flex align-items-center gap-3 mb-3">
            <div class="section-icon">
              <i class="bi bi-heart-fill text-warning"></i>
            </div>
            <h2 class="section-title mb-0">Mes Favoris</h2>
          </div>
        </div>
        <div class="section-content" id="userFavorites">
          <div class="empty-state-small">
            <i class="bi bi-heart text-muted fs-1 mb-2"></i>
            <p class="text-muted mb-0">Aucun événement en favoris</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Bouton retour -->
    <div class="text-center mt-5">
      <a href="./" data-link class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Retour à l'accueil
      </a>
    </div>
  </div>

  <!-- Modal Confirmation Changement de mot de passe -->
  <div
    class="modal fade"
    id="changePasswordModal"
    tabindex="-1"
    aria-labelledby="changePasswordModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header bg-danger border-0">
          <h5
            class="modal-title d-flex align-items-center gap-2 text-white"
            id="changePasswordModalLabel"
          >
            <i class="bi bi-exclamation-triangle-fill"></i>
            Réinitialiser le mot de passe
          </h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body p-4">
          <div class="text-center mb-4">
            <div class="mb-3">
              <i
                class="bi bi-shield-exclamation text-danger"
                style="font-size: 4rem; opacity: 0.8"
              ></i>
            </div>
            <h6 class="text-dark mb-3">
              Êtes-vous sûr de vouloir réinitialiser votre mot de passe ?
            </h6>
          </div>

          <div class="alert alert-warning border-0 shadow-sm mb-0">
            <div class="d-flex align-items-start gap-2">
              <i class="bi bi-info-circle-fill text-warning fs-5"></i>
              <div>
                <strong class="d-block mb-1"
                  >Un code de vérification sera envoyé à votre adresse
                  email.</strong
                >
                <small class="text-muted"
                  >Vous serez déconnecté après la réinitialisation et devrez
                  vous reconnecter avec votre nouveau mot de passe.</small
                >
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer border-0 bg-light">
          <button
            type="button"
            class="btn btn-outline-secondary"
            data-bs-dismiss="modal"
          >
            <i class="bi bi-x-circle me-2"></i>Non
          </button>
          <button
            type="button"
            class="btn btn-danger"
            id="btnConfirmPasswordReset"
          >
            <i class="bi bi-check-circle me-2"></i>Oui
          </button>
        </div>
      </div>
    </div>
  </div>
</template>
